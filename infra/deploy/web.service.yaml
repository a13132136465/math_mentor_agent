# Cloud Run service reference — mathmentor-web
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mathmentor-web
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
    spec:
      containerConcurrency: 100
      containers:
        - image: REGION-docker.pkg.dev/PROJECT/mathmentor/web:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
