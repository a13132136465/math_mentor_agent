# Cloud Run service reference — mathmentor-api
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mathmentor-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT/mathmentor/api:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            - name: APP_ENV
              value: production
          startupProbe:
            httpGet:
              path: /v1/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
